<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer Ring -->
  <circle cx="64" cy="64" r="58" stroke="url(#grad1)" stroke-width="4" fill="none" opacity="0.4" />
  
  <!-- Inner Diamond -->
  <g transform="translate(64, 64)">
    <rect x="-22" y="-22" width="44" height="44" rx="6" fill="url(#grad1)" transform="rotate(45)" opacity="0.95"/>
    <!-- Core Dot -->
    <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Orbiting Dot (Static) -->
  <circle cx="64" cy="18" r="5" fill="#38bdf8"/>
</svg>
